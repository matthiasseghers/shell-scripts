name: Test Shell Scripts

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Run BATS Tests
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install bash
          chmod +x install-deps.sh
          ./install-deps.sh

      - name: Verify all dependencies installed
        run: ./install-deps.sh --check

      - name: Install BATS
        run: brew install bats-core

      - name: Run tests
        run: |
          chmod +x run-tests.sh
          ./run-tests.sh

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            /tmp/bats_test_*
            /tmp/bats_sidebar_check*
            frames/
            ocr/
            *.txt
          retention-days: 7