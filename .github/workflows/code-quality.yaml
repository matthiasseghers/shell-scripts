name: Code Quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck (Linting)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          format: tty
          severity: error

  shfmt:
    name: Shell Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install shfmt
        run: |
          wget -O /usr/local/bin/shfmt https://github.com/mvdan/sh/releases/latest/download/shfmt_v3.8.0_linux_amd64
          chmod +x /usr/local/bin/shfmt
      
      - name: Check shell script formatting
        run: |
          shfmt -d -i 2 -ci scripts/ .hooks/
